  <style>
    .hero-card {
      margin: 0 0 1.5rem;
      padding: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .hero-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .hero-card .work-hero {
      margin: 0;
    }

    .section-block {
      margin: 2rem 0 0;
    }

    .section-block h2 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
    }

    .section-block p,
    .section-block li {
      line-height: 1.6;
    }

    .work-meta,
    .section-block ul {
      list-style: none;
      padding-left: 0;
      margin-left: 0;
    }

    .work-meta li,
    .section-block li {
      list-style: none;
      margin-left: 0;
    }

    .ancillary-gallery.documentation-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: start;
      max-width: 920px;
      margin-top: 0.85rem;
    }

    .ancillary-gallery.documentation-grid .ancillary-figure {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(150px, 230px) 1fr;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .ancillary-gallery.documentation-grid .ancillary-figure a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      padding: 0.85rem;
      text-decoration: none;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.025);
    }

    .ancillary-gallery.documentation-grid .ancillary-figure img {
      display: block;
      width: 100%;
      max-width: 210px;
      max-height: 170px;
      height: auto;
      object-fit: contain;
      margin: 0 auto;
      border-radius: 10px;
    }

    .ancillary-gallery.documentation-grid .ancillary-figure figcaption {
      display: block;
      margin: 0;
      padding: 0.95rem 1.05rem;
      font-size: 0.95rem;
      line-height: 1.55;
      text-align: left;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-title {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 650;
      line-height: 1.35;
    }

    .card-detail-text {
      display: block;
      margin-top: 0.35rem;
    }

    @media (max-width: 820px) {
      .ancillary-gallery.documentation-grid .ancillary-figure {
        grid-template-columns: 1fr;
      }

      .ancillary-gallery.documentation-grid .ancillary-figure a {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ancillary-gallery.documentation-grid .ancillary-figure img {
        max-width: 260px;
        max-height: 190px;
      }
    }
