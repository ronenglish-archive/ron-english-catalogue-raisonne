<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guernica Rings - Ron English Catalogue Raisonne</title>

  <meta name="work-id" content="RE-011686" />

  <link rel="stylesheet" href="../../../css/styles.css" />

  <style>
.hero-card {
      margin: 0 0 1.5rem;
      padding: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .hero-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .hero-card .work-hero {
      margin: 0;
    }

    .section-block {
      margin: 2rem 0 0;
    }

    .section-block h2 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
    }

    .section-block p,
    .section-block li {
      line-height: 1.6;
    }

    .evidence-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .evidence-card {
      margin: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 16px;
      padding: 0.9rem;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
    }

    .evidence-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
      background: #f3f4f6;
    }

    .evidence-card figcaption {
      margin: 0.65rem 0 0;
      font-size: 0.95rem;
      line-height: 1.45;
      text-align: center;
      color: #374151;
    }

    .work-meta,
    .section-block ul {
      list-style: none;
      padding-left: 0;
      margin-left: 0;
    }

    .work-meta li,
    .section-block li {
      list-style: none;
      margin-left: 0;
    }
  
    /* Grin and Cathy added documentation and digitized galleries */
    .digitized-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 0.85rem;
    }

    .digitized-gallery-grid .gallery-item {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .digitized-gallery-grid .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.20);
    }

    .digitized-gallery-grid .gallery-item img {
      display: block;
      width: 100%;
      height: 360px;
      object-fit: contain;
      padding: 0.85rem;
      background: rgba(255, 255, 255, 0.025);
      border-bottom: 0;
    }

    .ancillary-gallery.documentation-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: start;
      max-width: 920px;
      margin-top: 0.85rem;
    }

    .ancillary-gallery.documentation-grid .ancillary-figure {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(150px, 230px) 1fr;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .ancillary-gallery.documentation-grid .ancillary-figure a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      padding: 0.85rem;
      text-decoration: none;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.025);
    }

    .ancillary-gallery.documentation-grid .ancillary-figure img {
      display: block;
      width: 100%;
      max-width: 210px;
      max-height: 170px;
      height: auto;
      object-fit: contain;
      margin: 0 auto;
      border-radius: 10px;
    }

    .ancillary-gallery.documentation-grid .ancillary-figure figcaption {
      display: block;
      margin: 0;
      padding: 0.95rem 1.05rem;
      font-size: 0.95rem;
      line-height: 1.55;
      text-align: left;
      background: rgba(255, 255, 255, 0.02);
    }

    .card-title {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 650;
      line-height: 1.35;
    }

    .card-detail-text {
      display: block;
      margin-top: 0.35rem;
    }

    @media (max-width: 820px) {
      .ancillary-gallery.documentation-grid .ancillary-figure {
        grid-template-columns: 1fr;
      }

      .ancillary-gallery.documentation-grid .ancillary-figure a {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ancillary-gallery.documentation-grid .ancillary-figure img {
        max-width: 260px;
        max-height: 190px;
      }

      .digitized-gallery-grid .gallery-item img {
        height: 300px;
      }
    }

    /* Global detail-format pass: Digitized Versions outer card */
    .digitized-card {
      margin: 0.85rem auto 0;
      padding: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      max-width: 920px;
    }

    .digitized-card .digitized-gallery-grid {
      margin-top: 0;
    }
  
    /* Ancillary/documentation image containment repair */
    .ancillary-gallery.documentation-grid,
    .section-block .documentation-grid,
    .section-block .evidence-grid {
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-block .ancillary-gallery.documentation-grid figure,
    .section-block .documentation-grid figure,
    .section-block figure.ancillary-figure {
      overflow: hidden;
    }

    .section-block .ancillary-gallery.documentation-grid .ancillary-figure,
    .section-block .documentation-grid .ancillary-figure,
    .section-block .documentation-grid figure,
    .section-block figure.ancillary-figure {
      border-radius: 16px;
    }

    .section-block .ancillary-gallery.documentation-grid img,
    .section-block .documentation-grid img,
    .section-block .ancillary-figure img,
    .section-block .evidence-card img,
    .section-block .ref-figure img,
    .section-block img.ref-image {
      display: block;
      width: 100%;
      max-width: 230px;
      max-height: 190px;
      height: auto;
      object-fit: contain;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
    }

    .section-block .evidence-grid .evidence-card img {
      max-width: 100%;
      max-height: 260px;
    }

    .section-block .documentation-grid a,
    .section-block .ancillary-gallery.documentation-grid a {
      overflow: hidden;
    }

    @media (max-width: 820px) {
      .section-block .ancillary-gallery.documentation-grid img,
      .section-block .documentation-grid img,
      .section-block .ancillary-figure img,
      .section-block .ref-figure img,
      .section-block img.ref-image {
        max-width: 260px;
        max-height: 220px;
      }
    }
    /* End ancillary/documentation image containment repair */
  </style>
