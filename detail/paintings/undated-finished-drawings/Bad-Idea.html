    .hero-card {

      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);

    }

    .hero-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .hero-card .work-hero {
      margin: 0;
    }

    .section-block {
      margin: 2rem 0 0;
    }

      font-size: 1.25rem;
    }

    .section-block p,
    .section-block li {
      line-height: 1.6;
    }

    .evidence-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .evidence-card {
      margin: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 16px;
      padding: 0.9rem;
      background: rgba(255, 255, 255, 0.96);
      color: #111;
    }

    .evidence-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
      background: #f3f4f6;
    }

      margin: 0.65rem 0 0;
      font-size: 0.95rem;
      line-height: 1.45;
      text-align: center;
      color: #374151;
    }

    .work-meta,

      padding-left: 0;
      margin-left: 0;
    }

    .work-meta li,
    .section-block li {
      list-style: none;
      margin-left: 0;
    }
  
    /* Digitized versions gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fff;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,.04);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: 320px;
      object-fit: contain;
      background: #f8fafc;
      padding: 10px;
      border-bottom: 1px solid var(--border, #e5e7eb);
    }
  
    /* Bad Idea digitized versions: big no-caption card */
    .digitized-versions-section {
      max-width: 1120px;
      margin: 0 auto 24px;
      padding: 24px;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: var(--radius, 18px);
      background: #fff;
      box-shadow: var(--shadow, 0 10px 30px rgba(0,0,0,.08));
    }

    .digitized-versions-section h2 {
      margin: 0 0 18px;
      font-size: 24px;
      text-align: center;
    }

    .digitized-versions-section .gallery-grid {
      display: grid;

    .digitized-versions-section .gallery-item {

    }

    .digitized-versions-section .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .digitized-versions-section .gallery-item img {
      display: block;
      width: 100%;
      height: 380px;
      object-fit: contain;
      background: #f8fafc;
      padding: 10px;
      border-bottom: 0;
    }

    @media (max-width: 560px) {
      .digitized-versions-section {
        padding: 18px;
      }

      .digitized-versions-section .gallery-item img {
        height: 300px;
      }
    }
