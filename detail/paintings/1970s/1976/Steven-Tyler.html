    :root{

    .site-header{

      margin:0 auto;

    .site-header h1{

    }

    .work-layout{
      max-width:1080px;
      margin:0 auto;
      padding:0 18px 60px;
    }

    .hero-wrap{
      max-width:760px;
      margin:0 auto 32px;
    }

    .work-hero{
      display:block;
      width:100%;
      height:auto;
      background:#f3f4f6;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
    }

    .work-meta{
      list-style:none;
      max-width:760px;
      margin:0 auto 34px;
      padding:10px 0;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
    }

    .work-meta li{
      display:grid;
      grid-template-columns:max-content max-content;
      justify-content:center;
      align-items:start;
      column-gap:18px;
      margin:0;
      padding:10px 0;
      border-top:1px solid #f1f5f9;
    }

    .work-meta li:first-child{
      border-top:none;
    }

    .meta-label{
      font-weight:600;
      color:#111;
      text-align:right;
      white-space:nowrap;
    }

    .meta-value{
      color:#111;
      text-align:left;

      margin:0 auto 28px;
      padding-top:18px;
      border-top:1px solid var(--border);
    }

      font-size:1.05rem;
      line-height:1.2;
      letter-spacing:.01em;
    }

    .section-block p{
      margin:0 0 14px;
      color:#111;
    }

    .section-block p:last-child{
      margin-bottom:0;
    }

    .section-block em{
      font-style:italic;
    }

    a{
      color:inherit;
    }

      .site-header{
        padding:24px 14px 16px;
      }

      .work-layout{
        padding:0 14px 48px;
      }

      .hero-wrap,
      .work-meta,
      .section-block{
        max-width:100%;
      }

      .work-meta li{
        grid-template-columns:1fr;
        justify-content:start;
        row-gap:2px;
      }

      .meta-label,
      .meta-value{
        text-align:left;
      }
